# Testcontainers configuration
# Enable container reuse for faster test execution in local development
# In CI, this should be disabled (set to false) for clean test runs
testcontainers.reuse.enable=true

# Disable Ryuk (resource cleanup) if needed for debugging
# testcontainers.ryuk.disabled=false

