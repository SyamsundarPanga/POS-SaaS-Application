<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial; background:#fff3f3; padding:20px;">
<div style="max-width:600px;margin:auto;background:white;padding:25px;border-radius:8px;">
    <h2 style="color:#e74c3c;">Payment Failed ❌</h2>

    <p>Hi <b th:text="${name}"></b>,</p>

    <p>Your payment for Order <strong th:text="${orderNumber}"></strong> was unsuccessful.</p>

    <p><strong>Reason:</strong> <span th:text="${reason}"></span></p>

    <a th:href="${retryUrl}"
       style="display:inline-block;margin-top:15px;padding:10px 20px;background:#e74c3c;color:white;text-decoration:none;border-radius:4px;">
        Retry Payment
    </a>
</div>
</body>
</html>
