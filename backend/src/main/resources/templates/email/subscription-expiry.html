<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial; background:#fdf6e3; padding:20px;">
<div style="max-width:600px;margin:auto;background:white;padding:25px;border-radius:8px;">
    <h2 style="color:#f39c12;">Subscription Expiring Soon ⚠</h2>

    <p>Hello <b th:text="${name}"></b>,</p>

    <p>Your subscription plan <strong th:text="${planName}"></strong> will expire on
        <strong th:text="${expiryDate}"></strong>.</p>

    <a th:href="${upgradeUrl}"
       style="display:inline-block;margin-top:15px;padding:10px 20px;background:#f39c12;color:white;text-decoration:none;border-radius:4px;">
        Renew Now
    </a>
</div>
</body>
</html>
