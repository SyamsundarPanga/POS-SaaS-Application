<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Link</title>
</head>

<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f6f8;">
    <table width="100%" cellspacing="0" cellpadding="0" style="background-color: #f4f6f8; padding: 24px;">
        <tr>
            <td align="center">
                <table width="100%" cellspacing="0" cellpadding="0"
                    style="max-width: 560px; background: #ffffff; border-radius: 10px; overflow: hidden;">
                    <tr>
                        <td style="padding: 24px; background-color: #0f172a; color: #ffffff;">
                            <h2 style="margin: 0; font-size: 22px;">PayPoint Password Reset</h2>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 24px;">
                            <p style="margin: 0 0 14px; color: #1e293b; font-size: 15px;">
                                Click the button below to reset your password. This link will expire in 30 minutes.
                            </p>
                            <div style="text-align: center; margin: 18px 0;">
                                <a th:href="${resetUrl}"
                                    style="display: inline-block; font-size: 18px; font-weight: 700; color: #ffffff; background: #0f172a; border-radius: 8px; padding: 12px 18px; text-decoration: none;">Reset
                                    Password</a>
                            </div>
                            <p style="margin: 0 0 8px; color: #334155; font-size: 14px;">
                                If the button doesn't work, copy and paste this link into your browser:<br>
                                <span th:text="${resetUrl}" style="word-break: break-all; color: #0f172a;"></span>
                            </p>
                            <p style="margin: 0; color: #64748b; font-size: 13px;">
                                If you did not request this, you can ignore this email.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
